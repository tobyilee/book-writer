<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <style>
      .edge { stroke: #e89776; stroke-width: 4; fill: none; opacity: 0.88; }
      .edge-dim { stroke: #e89776; stroke-width: 3; fill: none; opacity: 0.5; }
      .node { fill: #f5c9a8; stroke: #e89776; stroke-width: 3; }
      .node-core { fill: #ffd9bf; stroke: #e89776; stroke-width: 3; }
    </style>
  </defs>

  <!-- Panel 1: SDK (denser graph) -->
  <g transform="translate(100,20)">
    <line class="edge" x1="150" y1="60"  x2="60"  y2="180"/>
    <line class="edge" x1="150" y1="60"  x2="240" y2="180"/>
    <line class="edge" x1="60"  y1="180" x2="150" y2="300"/>
    <line class="edge" x1="240" y1="180" x2="150" y2="300"/>
    <line class="edge" x1="60"  y1="180" x2="240" y2="180"/>
    <line class="edge-dim" x1="150" y1="60"  x2="150" y2="300"/>
    <circle class="node" cx="150" cy="60"  r="22"/>
    <circle class="node" cx="60"  cy="180" r="22"/>
    <circle class="node" cx="240" cy="180" r="22"/>
    <circle class="node" cx="150" cy="300" r="22"/>
  </g>

  <!-- Panel 2: LangChain (linear-ish chain with branch) -->
  <g transform="translate(500,20)">
    <line class="edge" x1="150" y1="60"  x2="150" y2="160"/>
    <line class="edge" x1="150" y1="160" x2="80"  y2="240"/>
    <line class="edge" x1="150" y1="160" x2="220" y2="240"/>
    <line class="edge" x1="80"  y1="240" x2="150" y2="300"/>
    <line class="edge" x1="220" y1="240" x2="150" y2="300"/>
    <circle class="node" cx="150" cy="60"  r="22"/>
    <circle class="node" cx="150" cy="160" r="22"/>
    <circle class="node" cx="80"  cy="240" r="22"/>
    <circle class="node" cx="220" cy="240" r="22"/>
    <circle class="node" cx="150" cy="300" r="22"/>
  </g>

  <!-- Panel 3: LangGraph (explicit cycle) -->
  <g transform="translate(900,20)">
    <circle cx="150" cy="180" r="100" stroke="#e89776" stroke-width="5" fill="none" opacity="0.95"/>
    <polygon points="232,168 268,182 232,196" fill="#e89776"/>
    <polygon points="62,196 26,182 62,168" fill="#e89776" opacity="0.85"/>
    <circle class="node-core" cx="150" cy="80"  r="22"/>
    <circle class="node-core" cx="250" cy="180" r="22"/>
    <circle class="node-core" cx="150" cy="280" r="22"/>
    <circle class="node-core" cx="50"  cy="180" r="22"/>
  </g>
</svg>
