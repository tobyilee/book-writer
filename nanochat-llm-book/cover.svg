<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" viewBox="0 0 1600 2560">
  <!-- ============================================================
       나노챗 해부학 — Cover
       Concept: GPT block exploded view (분해도)
       Palette: off-white base + deep blue + mustard yellow
       ============================================================ -->

  <defs>
    <!-- subtle paper texture via gradient -->
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF8F3"/>
      <stop offset="100%" stop-color="#F4F1E8"/>
    </linearGradient>

    <!-- soft shadow for floating parts -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- block style -->
    <style><![CDATA[
      .han-black  { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-weight: 900; }
      .han-bold   { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-weight: 700; }
      .han-med    { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-weight: 500; }
      .han-light  { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-weight: 300; }
      .mono       { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; font-weight: 500; }
      .mono-it    { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; font-weight: 400; font-style: italic; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="2560" fill="url(#paperGrad)"/>

  <!-- Top thin rule -->
  <rect x="120" y="120" width="1360" height="2" fill="#1E3A5F"/>
  <!-- Bottom thin rule -->
  <rect x="120" y="2438" width="1360" height="2" fill="#1E3A5F"/>

  <!-- Top-left metadata: 시리즈 라벨 (해부학 도감 느낌) -->
  <text x="120" y="200" class="mono" font-size="26" fill="#1E3A5F" letter-spacing="3">
    AN ANATOMY OF LLM TRAINING · VOL. 01
  </text>

  <!-- Top-right small tag -->
  <text x="1480" y="200" class="mono" font-size="26" fill="#7A7A7A" letter-spacing="2" text-anchor="end">
    8K LOC · 1 GPU · 3 HOURS
  </text>

  <!-- ============================================================
       TITLE BLOCK (top third)
       ============================================================ -->
  <!-- 제목: 나노챗 해부학 -->
  <text x="120" y="430" class="han-black" font-size="200" fill="#1E3A5F" letter-spacing="-12">나노챗</text>
  <text x="120" y="650" class="han-black" font-size="200" fill="#1E3A5F" letter-spacing="-12">해부학</text>

  <!-- small accent dot after 해부학 -->
  <circle cx="900" cy="640" r="20" fill="#D4A52A"/>

  <!-- 부제 한글 -->
  <text x="120" y="740" class="han-med" font-size="42" fill="#1E3A5F" letter-spacing="-2">
    한 GPU 노드 3시간으로 ChatGPT를 만든다
  </text>
  <!-- 부제 영문 mono -->
  <text x="120" y="800" class="mono-it" font-size="32" fill="#7A7A7A" letter-spacing="-1">
    karpathy/nanochat — a line-by-line dissection
  </text>

  <!-- ============================================================
       EXPLODED VIEW — GPT BLOCK ANATOMY
       Centered around x=800, vertical stack with 1-point perspective
       ============================================================ -->

  <!-- Central residual stream (vertical line, the spine of the transformer) -->
  <g opacity="0.85">
    <line x1="800" y1="900" x2="800" y2="2120" stroke="#1E3A5F" stroke-width="3" stroke-dasharray="2,8"/>
    <!-- residual stream label -->
    <text x="820" y="2150" class="mono" font-size="22" fill="#1E3A5F">residual stream  →  x</text>
  </g>

  <!-- ============================================================
       Part 1 (top): INPUT EMBEDDING + RoPE
       ============================================================ -->
  <g transform="translate(800, 950)" filter="url(#softShadow)">
    <!-- isometric-ish parallelogram -->
    <polygon points="-280,-40 280,-40 320,40 -240,40" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="3"/>
    <text x="0" y="-5" class="han-bold" font-size="34" fill="#1E3A5F" text-anchor="middle">Token Embedding</text>
    <text x="0" y="28" class="mono" font-size="22" fill="#7A7A7A" text-anchor="middle">wte[input_ids]</text>
  </g>
  <!-- leader line to label -->
  <g>
    <line x1="1120" y1="950" x2="1330" y2="940" stroke="#D4A52A" stroke-width="2"/>
    <circle cx="1120" cy="950" r="5" fill="#D4A52A"/>
    <text x="1340" y="935" class="mono" font-size="22" fill="#1E3A5F">EMB</text>
    <text x="1340" y="965" class="han-light" font-size="20" fill="#7A7A7A">어휘 → 벡터</text>
  </g>

  <!-- ============================================================
       Part 2: RMSNorm
       ============================================================ -->
  <g transform="translate(800, 1100)" filter="url(#softShadow)">
    <polygon points="-230,-30 230,-30 260,30 -200,30" fill="#FAF8F3" stroke="#1E3A5F" stroke-width="2.5"/>
    <text x="0" y="-2" class="han-bold" font-size="28" fill="#1E3A5F" text-anchor="middle">RMSNorm</text>
    <text x="0" y="22" class="mono" font-size="20" fill="#7A7A7A" text-anchor="middle">x / rms(x)</text>
  </g>
  <g>
    <line x1="280" y1="1100" x2="500" y2="1100" stroke="#D4A52A" stroke-width="2"/>
    <circle cx="500" cy="1100" r="5" fill="#D4A52A"/>
    <text x="270" y="1095" class="mono" font-size="22" fill="#1E3A5F" text-anchor="end">NORM</text>
    <text x="270" y="1125" class="han-light" font-size="20" fill="#7A7A7A" text-anchor="end">정규화</text>
  </g>

  <!-- ============================================================
       Part 3 (largest, center): MULTI-HEAD ATTENTION
       sub-parts: Q, K, V, RoPE, softmax
       ============================================================ -->
  <g transform="translate(800, 1320)" filter="url(#softShadow)">
    <!-- main box -->
    <polygon points="-340,-90 340,-90 380,90 -300,90" fill="#1E3A5F" stroke="#1E3A5F" stroke-width="3"/>
    <text x="0" y="-40" class="han-bold" font-size="34" fill="#F8F6F1" text-anchor="middle">Causal Self-Attention</text>

    <!-- 4 small sub-blocks: Q K V RoPE -->
    <g transform="translate(-220, 30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#D4A52A" stroke="#F8F6F1" stroke-width="1.5"/>
      <text x="0" y="8" class="mono" font-size="26" fill="#1E3A5F" text-anchor="middle">Q</text>
    </g>
    <g transform="translate(-80, 30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#D4A52A" stroke="#F8F6F1" stroke-width="1.5"/>
      <text x="0" y="8" class="mono" font-size="26" fill="#1E3A5F" text-anchor="middle">K</text>
    </g>
    <g transform="translate(60, 30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#D4A52A" stroke="#F8F6F1" stroke-width="1.5"/>
      <text x="0" y="8" class="mono" font-size="26" fill="#1E3A5F" text-anchor="middle">V</text>
    </g>
    <g transform="translate(220, 30)">
      <rect x="-70" y="-25" width="140" height="50" fill="#F8F6F1" stroke="#D4A52A" stroke-width="2"/>
      <text x="0" y="8" class="mono" font-size="22" fill="#1E3A5F" text-anchor="middle">RoPE</text>
    </g>
  </g>
  <!-- leader for ATTENTION -->
  <g>
    <line x1="1180" y1="1320" x2="1380" y2="1320" stroke="#D4A52A" stroke-width="2"/>
    <circle cx="1180" cy="1320" r="5" fill="#D4A52A"/>
    <text x="1390" y="1315" class="mono" font-size="22" fill="#1E3A5F">ATTN</text>
    <text x="1390" y="1345" class="han-light" font-size="20" fill="#7A7A7A">문맥 응시</text>
  </g>
  <!-- leader for Q/K/V -->
  <g>
    <line x1="420" y1="1350" x2="220" y2="1380" stroke="#D4A52A" stroke-width="2"/>
    <circle cx="420" cy="1350" r="5" fill="#D4A52A"/>
    <text x="210" y="1375" class="mono" font-size="22" fill="#1E3A5F" text-anchor="end">QKV</text>
    <text x="210" y="1405" class="han-light" font-size="20" fill="#7A7A7A" text-anchor="end">질의·열쇠·값</text>
  </g>

  <!-- residual + sign between attention and MLP -->
  <g transform="translate(800, 1480)">
    <circle r="22" fill="#FAF8F3" stroke="#1E3A5F" stroke-width="3"/>
    <text x="0" y="9" class="mono" font-size="28" fill="#1E3A5F" text-anchor="middle">+</text>
  </g>

  <!-- ============================================================
       Part 4: RMSNorm (second)
       ============================================================ -->
  <g transform="translate(800, 1620)" filter="url(#softShadow)">
    <polygon points="-230,-30 230,-30 260,30 -200,30" fill="#FAF8F3" stroke="#1E3A5F" stroke-width="2.5"/>
    <text x="0" y="-2" class="han-bold" font-size="28" fill="#1E3A5F" text-anchor="middle">RMSNorm</text>
    <text x="0" y="22" class="mono" font-size="20" fill="#7A7A7A" text-anchor="middle">x / rms(x)</text>
  </g>

  <!-- ============================================================
       Part 5: MLP (Linear → ReLU² → Linear)
       ============================================================ -->
  <g transform="translate(800, 1800)" filter="url(#softShadow)">
    <polygon points="-300,-65 300,-65 340,65 -260,65" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="3"/>
    <text x="0" y="-15" class="han-bold" font-size="32" fill="#1E3A5F" text-anchor="middle">MLP</text>
    <!-- inner stages -->
    <g transform="translate(0, 30)">
      <rect x="-220" y="-18" width="120" height="36" fill="none" stroke="#1E3A5F" stroke-width="1.5"/>
      <text x="-160" y="6" class="mono" font-size="20" fill="#1E3A5F" text-anchor="middle">Linear ↑</text>

      <rect x="-50" y="-18" width="100" height="36" fill="#D4A52A"/>
      <text x="0" y="7" class="mono" font-size="20" fill="#1E3A5F" text-anchor="middle">ReLU²</text>

      <rect x="100" y="-18" width="120" height="36" fill="none" stroke="#1E3A5F" stroke-width="1.5"/>
      <text x="160" y="6" class="mono" font-size="20" fill="#1E3A5F" text-anchor="middle">Linear ↓</text>
    </g>
  </g>
  <!-- leader for MLP -->
  <g>
    <line x1="1140" y1="1800" x2="1350" y2="1800" stroke="#D4A52A" stroke-width="2"/>
    <circle cx="1140" cy="1800" r="5" fill="#D4A52A"/>
    <text x="1360" y="1795" class="mono" font-size="22" fill="#1E3A5F">MLP</text>
    <text x="1360" y="1825" class="han-light" font-size="20" fill="#7A7A7A">사고 회로</text>
  </g>

  <!-- residual + sign at bottom -->
  <g transform="translate(800, 1960)">
    <circle r="22" fill="#FAF8F3" stroke="#1E3A5F" stroke-width="3"/>
    <text x="0" y="9" class="mono" font-size="28" fill="#1E3A5F" text-anchor="middle">+</text>
  </g>

  <!-- ============================================================
       Bottom-left: "× N layers" indicator
       ============================================================ -->
  <g transform="translate(280, 2050)">
    <text x="0" y="0" class="mono" font-size="30" fill="#1E3A5F">× N layers</text>
    <text x="0" y="36" class="han-light" font-size="22" fill="#7A7A7A">위 블록을 N번 쌓으면 GPT가 된다</text>
  </g>

  <!-- ============================================================
       BOTTOM — emphasized code line + author
       ============================================================ -->
  <!-- emphasized single code line (from spec) -->
  <g transform="translate(120, 2240)">
    <rect x="0" y="0" width="1360" height="78" fill="#1E3A5F"/>
    <text x="30" y="50" class="mono" font-size="32" fill="#F8F6F1">
      x = x + block(x, ve, cos_sin, window_size, kv_cache)
    </text>
    <!-- corner accent -->
    <rect x="0" y="0" width="14" height="78" fill="#D4A52A"/>
  </g>

  <!-- caption under the code line -->
  <text x="120" y="2350" class="han-light" font-size="22" fill="#7A7A7A">
    이 한 줄을 이해하면 8,000줄을 이해할 수 있다.
  </text>

  <!-- Author (bottom-right, small) -->
  <text x="1480" y="2400" class="han-med" font-size="36" fill="#1E3A5F" text-anchor="end">Toby-AI 지음</text>

  <!-- Publisher mark (bottom-left) -->
  <text x="120" y="2400" class="mono" font-size="22" fill="#1E3A5F" letter-spacing="3">BOOK-WRITER · v1.2.0</text>

</svg>
